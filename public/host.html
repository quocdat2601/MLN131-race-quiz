<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host — Đường Đua Xuyên Tuyến</title>
  <link rel="stylesheet" href="host.css" />
</head>
<body>

<!-- ── LOBBY ─────────────────────────────────────────────────── -->
<div id="screen-lobby" class="screen active">
  <div class="lobby-box">
    <h1>🦆 Đường Đua Xuyên Tuyến</h1>
    <p class="subtitle">Duck Race Edition — Lịch sử 1954-1965</p>
    <button id="btn-create-room" class="btn-primary">Tạo Phòng</button>

    <div id="lobby-room-info" style="display:none">
      <div class="room-code-label">Mã Phòng</div>
      <div id="lobby-room-code" class="room-code-big"></div>
      <div class="groups-joined-label">Nhóm đã vào: <span id="lobby-groups-count">0</span>/6</div>
      <ul id="lobby-groups-list" class="groups-list"></ul>
      <button id="btn-start-game" class="btn-success" disabled>Bắt Đầu Game</button>
    </div>
  </div>
</div>

<!-- ── GAME ──────────────────────────────────────────────────── -->
<div id="screen-game" class="screen">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="room-code-small">Phòng: <strong id="topbar-code"></strong></div>
    <div id="question-counter" class="q-counter">Câu 0/20</div>
    <div class="controls">
      <button id="btn-pause-resume" class="btn-ctrl btn-yellow">⏸ Pause</button>
      <button id="btn-reveal"       class="btn-ctrl btn-blue"  >👁 Reveal</button>
      <button id="btn-skip-items"   class="btn-ctrl btn-purple" style="display:none">⏭ Skip Items</button>
      <button id="btn-next-q"       class="btn-ctrl btn-green"  style="display:none">▶ Câu Tiếp</button>
      <button id="btn-end-game"     class="btn-ctrl btn-red"   >⛔ Kết Thúc</button>
    </div>
  </div>

  <!-- Question panel -->
  <div id="question-panel" class="question-panel" style="display:none">
    <div class="question-header">
      <span id="q-number-badge" class="q-badge"></span>
      <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
      <span id="timer-display" class="timer-text">20</span>
      <span id="answer-count-badge" class="answer-badge">0 nhóm đã trả lời</span>
    </div>
    <div id="q-text" class="q-text"></div>
    <div class="options-grid">
      <div class="option-card" id="opt-A"><span class="opt-letter">A</span><span id="opt-A-text"></span></div>
      <div class="option-card" id="opt-B"><span class="opt-letter">B</span><span id="opt-B-text"></span></div>
      <div class="option-card" id="opt-C"><span class="opt-letter">C</span><span id="opt-C-text"></span></div>
      <div class="option-card" id="opt-D"><span class="opt-letter">D</span><span id="opt-D-text"></span></div>
    </div>
  </div>

  <!-- Item phase banner -->
  <div id="item-phase-banner" class="item-phase-banner" style="display:none">
    <span>🎮 Giai Đoạn Dùng Vật Phẩm</span>
    <span id="item-timer" class="item-timer">15</span>
  </div>

  <!-- Race track -->
  <div id="race-track" class="race-track">
    <!-- Finish line marker -->
    <div class="start-line"></div>
    <!-- Lanes generated by JS -->
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>
</div>

<!-- ── GAME OVER ──────────────────────────────────────────────── -->
<div id="screen-gameover" class="screen">
  <div class="gameover-box">
    <h2>🏆 Kết Quả Cuối Cùng</h2>
    <ol id="final-rankings" class="rankings-list"></ol>
    <button id="btn-restart" class="btn-primary">Chơi Lại</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="host.js"></script>
</body>
</html>
